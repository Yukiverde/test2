<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Maze Escape</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#10002b,#240046,#3c096c,#5a189a);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    color:#00ffff;
    text-shadow:0 0 15px #00ffff;
    margin:15px 0;
}

#info{
    font-size:20px;
    margin-bottom:10px;
}

canvas{
    background:#050816;
    border:4px solid #00ffff;
    box-shadow:0 0 25px #00ffff;
}

button{
    margin-top:15px;
    padding:12px 24px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ff00ff;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

#instructions{
    margin-top:10px;
    color:#90caf9;
}
</style>
</head>
<body>

<h1>⚡ NEON MAZE ESCAPE ⚡</h1>

<div id="info">
    ⏱ Time: <span id="timer">0</span>s
</div>

<canvas id="maze"></canvas>
<br>
<button onclick="newMaze()">New Maze</button>

<div id="instructions">
    WASD or Arrow Keys<br>
    The chaser starts at your old position after your first move!
</div>

<script>

const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

const cols = 20;
const rows = 20;
const size = 30;

canvas.width = cols * size;
canvas.height = rows * size;

let maze = [];
let timer = 0;
let timerInterval;
let chaseInterval;

let player;
let goal;
let chaser;

let firstMoveMade = false;

class Cell{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.visited = false;

        this.walls = {
            top:true,
            right:true,
            bottom:true,
            left:true
        };
    }
}

function index(x,y){
    if(x < 0 || y < 0 || x >= cols || y >= rows) return -1;
    return x + y * cols;
}

function generateMaze(){

    maze = [];

    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            maze.push(new Cell(x,y));
        }
    }

    let stack = [];
    let current = maze[0];
    current.visited = true;

    while(true){

        let neighbors = [];

        let top = maze[index(current.x,current.y-1)];
        let right = maze[index(current.x+1,current.y)];
        let bottom = maze[index(current.x,current.y+1)];
        let left = maze[index(current.x-1,current.y)];

        if(top && !top.visited) neighbors.push(top);
        if(right && !right.visited) neighbors.push(right);
        if(bottom && !bottom.visited) neighbors.push(bottom);
        if(left && !left.visited) neighbors.push(left);

        if(neighbors.length > 0){

            let next =
                neighbors[Math.floor(Math.random()*neighbors.length)];

            stack.push(current);

            removeWalls(current,next);

            next.visited = true;
            current = next;
        }
        else if(stack.length > 0){
            current = stack.pop();
        }
        else{
            break;
        }
    }

    // Create additional routes
    for(let i=0;i<70;i++){

        let x = Math.floor(Math.random()*cols);
        let y = Math.floor(Math.random()*rows);

        let cell = maze[index(x,y)];

        let directions = [];

        if(x > 0) directions.push("left");
        if(x < cols-1) directions.push("right");
        if(y > 0) directions.push("top");
        if(y < rows-1) directions.push("bottom");

        let dir =
            directions[Math.floor(Math.random()*directions.length)];

        if(dir === "left"){
            let neighbor = maze[index(x-1,y)];
            cell.walls.left = false;
            neighbor.walls.right = false;
        }

        if(dir === "right"){
            let neighbor = maze[index(x+1,y)];
            cell.walls.right = false;
            neighbor.walls.left = false;
        }

        if(dir === "top"){
            let neighbor = maze[index(x,y-1)];
            cell.walls.top = false;
            neighbor.walls.bottom = false;
        }

        if(dir === "bottom"){
            let neighbor = maze[index(x,y+1)];
            cell.walls.bottom = false;
            neighbor.walls.top = false;
        }
    }
}

function removeWalls(a,b){

    let dx = a.x - b.x;
    let dy = a.y - b.y;

    if(dx === 1){
        a.walls.left = false;
        b.walls.right = false;
    }

    if(dx === -1){
        a.walls.right = false;
        b.walls.left = false;
    }

    if(dy === 1){
        a.walls.top = false;
        b.walls.bottom = false;
    }

    if(dy === -1){
        a.walls.bottom = false;
        b.walls.top = false;
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const cell of maze){

        const x = cell.x * size;
        const y = cell.y * size;

        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;

        if(cell.walls.top){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x+size,y);
            ctx.stroke();
        }

        if(cell.walls.right){
            ctx.beginPath();
            ctx.moveTo(x+size,y);
            ctx.lineTo(x+size,y+size);
            ctx.stroke();
        }

        if(cell.walls.bottom){
            ctx.beginPath();
            ctx.moveTo(x,y+size);
            ctx.lineTo(x+size,y+size);
            ctx.stroke();
        }

        if(cell.walls.left){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+size);
            ctx.stroke();
        }
    }

    // Goal
    ctx.fillStyle="#00ff66";
    ctx.shadowColor="#00ff66";
    ctx.shadowBlur=20;
    ctx.fillRect(
        goal.x*size+6,
        goal.y*size+6,
        size-12,
        size-12
    );

    // Chaser
    if(chaser){
        ctx.beginPath();
        ctx.fillStyle="#ff006e";
        ctx.shadowColor="#ff006e";
        ctx.shadowBlur=20;
        ctx.arc(
            chaser.x*size+size/2,
            chaser.y*size+size/2,
            size/3,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    // Player
    ctx.beginPath();
    ctx.fillStyle="#ffd60a";
    ctx.shadowColor="#ffd60a";
    ctx.shadowBlur=20;
    ctx.arc(
        player.x*size+size/2,
        player.y*size+size/2,
        size/3,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.shadowBlur = 0;
}

function move(dx,dy){

    let current = maze[index(player.x,player.y)];

    let oldX = player.x;
    let oldY = player.y;

    let moved = false;

    if(dx === 1 && !current.walls.right){
        player.x++;
        moved = true;
    }

    if(dx === -1 && !current.walls.left){
        player.x--;
        moved = true;
    }

    if(dy === 1 && !current.walls.bottom){
        player.y++;
        moved = true;
    }

    if(dy === -1 && !current.walls.top){
        player.y--;
        moved = true;
    }

    if(moved && !firstMoveMade){

        firstMoveMade = true;

        chaser = {
            x: oldX,
            y: oldY
        };

        chaseInterval = setInterval(moveChaser,350);
    }

    checkWin();
    draw();
}

document.addEventListener("keydown",(e)=>{

    switch(e.key.toLowerCase()){

        case "w":
        case "arrowup":
            move(0,-1);
            break;

        case "s":
        case "arrowdown":
            move(0,1);
            break;

        case "a":
        case "arrowleft":
            move(-1,0);
            break;

        case "d":
        case "arrowright":
            move(1,0);
            break;
    }
});

function moveChaser(){

    if(!chaser) return;

    let current = maze[index(chaser.x,chaser.y)];

    let options = [];

    if(!current.walls.right)
        options.push({x:1,y:0});

    if(!current.walls.left)
        options.push({x:-1,y:0});

    if(!current.walls.bottom)
        options.push({x:0,y:1});

    if(!current.walls.top)
        options.push({x:0,y:-1});

    options.sort((a,b)=>{

        let da =
            Math.abs((chaser.x+a.x)-player.x) +
            Math.abs((chaser.y+a.y)-player.y);

        let db =
            Math.abs((chaser.x+b.x)-player.x) +
            Math.abs((chaser.y+b.y)-player.y);

        return da-db;
    });

    if(options.length){

        chaser.x += options[0].x;
        chaser.y += options[0].y;
    }

    if(chaser.x === player.x &&
       chaser.y === player.y){

        gameOver();
    }

    draw();
}

function gameOver(){

    clearInterval(timerInterval);
    clearInterval(chaseInterval);

    setTimeout(()=>{
        alert("💀 The chaser caught you!");
        newMaze();
    },100);
}

function checkWin(){

    if(player.x === goal.x &&
       player.y === goal.y){

        clearInterval(timerInterval);
        clearInterval(chaseInterval);

        setTimeout(()=>{
            alert("🏆 You escaped in " + timer + " seconds!");
            newMaze();
        },100);
    }
}

function newMaze(){

    clearInterval(timerInterval);
    clearInterval(chaseInterval);

    generateMaze();

    player = {x:0,y:0};

    goal = {
        x:cols-1,
        y:rows-1
    };

    chaser = null;

    firstMoveMade = false;

    timer = 0;

    document.getElementById("timer").textContent = timer;

    timerInterval = setInterval(()=>{
        timer++;
        document.getElementById("timer").textContent = timer;
    },1000);

    draw();
}

newMaze();

</script>

</body>
</html>
