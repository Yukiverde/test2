<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Maze Escape</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#12002e,#1a237e,#004d40);
    color:#ffffff;
    font-family:Verdana,sans-serif;
    text-align:center;
    min-height:100vh;
}

h1{
    margin:15px;
    color:#00ffff;
    text-shadow:0 0 15px #00ffff;
}

#info{
    font-size:20px;
    margin-bottom:10px;
}

canvas{
    background:#050816;
    border:4px solid #00ffff;
    box-shadow:0 0 30px #00ffff;
}

button{
    margin-top:15px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#ff00ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #ff00ff;
}

#instructions{
    margin-top:10px;
    color:#90caf9;
}
</style>
</head>
<body>

<h1>⚡ NEON MAZE ESCAPE ⚡</h1>

<div id="info">
    ⏱ Time: <span id="timer">0</span>s
</div>

<canvas id="maze"></canvas>

<br>

<button onclick="newMaze()">Generate New Maze</button>

<div id="instructions">
    Move: WASD or Arrow Keys<br>
    Reach the green goal before the purple chaser catches you!
</div>

<script>

const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

const cols = 20;
const rows = 20;
const size = 30;

canvas.width = cols * size;
canvas.height = rows * size;

let maze = [];
let timer = 0;
let timerInterval;
let chaseInterval;

let player;
let goal;
let chaser;

class Cell{
    constructor(x,y){
        this.x = x;
        this.y = y;
        this.visited = false;

        this.walls = {
            top:true,
            right:true,
            bottom:true,
            left:true
        };
    }
}

function index(x,y){
    if(x < 0 || y < 0 || x >= cols || y >= rows) return -1;
    return x + y * cols;
}

function generateMaze(){

    maze = [];

    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            maze.push(new Cell(x,y));
        }
    }

    let stack = [];
    let current = maze[0];
    current.visited = true;

    while(true){

        let neighbors = [];

        let top = maze[index(current.x,current.y-1)];
        let right = maze[index(current.x+1,current.y)];
        let bottom = maze[index(current.x,current.y+1)];
        let left = maze[index(current.x-1,current.y)];

        if(top && !top.visited) neighbors.push(top);
        if(right && !right.visited) neighbors.push(right);
        if(bottom && !bottom.visited) neighbors.push(bottom);
        if(left && !left.visited) neighbors.push(left);

        if(neighbors.length > 0){

            let next =
                neighbors[Math.floor(Math.random()*neighbors.length)];

            stack.push(current);

            removeWalls(current,next);

            next.visited = true;
            current = next;
        }
        else if(stack.length > 0){
            current = stack.pop();
        }
        else{
            break;
        }
    }
}

function removeWalls(a,b){

    let dx = a.x - b.x;
    let dy = a.y - b.y;

    if(dx === 1){
        a.walls.left = false;
        b.walls.right = false;
    }

    if(dx === -1){
        a.walls.right = false;
        b.walls.left = false;
    }

    if(dy === 1){
        a.walls.top = false;
        b.walls.bottom = false;
    }

    if(dy === -1){
        a.walls.bottom = false;
        b.walls.top = false;
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const cell of maze){

        const x = cell.x * size;
        const y = cell.y * size;

        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;

        if(cell.walls.top){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x+size,y);
            ctx.stroke();
        }

        if(cell.walls.right){
            ctx.beginPath();
            ctx.moveTo(x+size,y);
            ctx.lineTo(x+size,y+size);
            ctx.stroke();
        }

        if(cell.walls.bottom){
            ctx.beginPath();
            ctx.moveTo(x,y+size);
            ctx.lineTo(x+size,y+size);
            ctx.stroke();
        }

        if(cell.walls.left){
            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x,y+size);
            ctx.stroke();
        }
    }

    // Goal
    ctx.fillStyle = "#00ff66";
    ctx.shadowColor = "#00ff66";
    ctx.shadowBlur = 20;
    ctx.fillRect(
        goal.x*size+7,
        goal.y*size+7,
        size-14,
        size-14
    );

    // Chaser
    ctx.beginPath();
    ctx.fillStyle = "#ff00ff";
    ctx.shadowColor = "#ff00ff";
    ctx.shadowBlur = 20;
    ctx.arc(
        chaser.x*size+size/2,
        chaser.y*size+size/2,
        size/3,
        0,
        Math.PI*2
    );
    ctx.fill();

    // Player
    ctx.beginPath();
    ctx.fillStyle = "#ffd600";
    ctx.shadowColor = "#ffd600";
    ctx.shadowBlur = 20;
    ctx.arc(
        player.x*size+size/2,
        player.y*size+size/2,
        size/3,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.shadowBlur = 0;
}

function move(dx,dy){

    let current = maze[index(player.x,player.y)];

    if(dx === 1 && !current.walls.right) player.x++;
    if(dx === -1 && !current.walls.left) player.x--;
    if(dy === 1 && !current.walls.bottom) player.y++;
    if(dy === -1 && !current.walls.top) player.y--;

    checkWin();
    draw();
}

document.addEventListener("keydown",e=>{

    switch(e.key.toLowerCase()){

        case "w":
        case "arrowup":
            move(0,-1);
            break;

        case "s":
        case "arrowdown":
            move(0,1);
            break;

        case "a":
        case "arrowleft":
            move(-1,0);
            break;

        case "d":
        case "arrowright":
            move(1,0);
            break;
    }
});

function moveChaser(){

    let dx = player.x - chaser.x;
    let dy = player.y - chaser.y;

    let current = maze[index(chaser.x,chaser.y)];

    let possible = [];

    if(!current.walls.right)
        possible.push({x:1,y:0});

    if(!current.walls.left)
        possible.push({x:-1,y:0});

    if(!current.walls.bottom)
        possible.push({x:0,y:1});

    if(!current.walls.top)
        possible.push({x:0,y:-1});

    possible.sort((a,b)=>{

        let da =
            Math.abs((chaser.x+a.x)-player.x) +
            Math.abs((chaser.y+a.y)-player.y);

        let db =
            Math.abs((chaser.x+b.x)-player.x) +
            Math.abs((chaser.y+b.y)-player.y);

        return da-db;
    });

    if(possible.length > 0){
        chaser.x += possible[0].x;
        chaser.y += possible[0].y;
    }

    if(chaser.x === player.x &&
       chaser.y === player.y){

        gameOver();
    }

    draw();
}

function gameOver(){

    clearInterval(timerInterval);
    clearInterval(chaseInterval);

    setTimeout(()=>{
        alert("💀 The chaser caught you!");
        newMaze();
    },100);
}

function checkWin(){

    if(player.x === goal.x &&
       player.y === goal.y){

        clearInterval(timerInterval);
        clearInterval(chaseInterval);

        setTimeout(()=>{
            alert("🏆 You escaped in " + timer + " seconds!");
            newMaze();
        },100);
    }
}

function newMaze(){

    generateMaze();

    player = {x:0,y:0};

    goal = {
        x:cols-1,
        y:rows-1
    };

    chaser = {
        x:Math.floor(cols/2),
        y:Math.floor(rows/2)
    };

    timer = 0;

    document.getElementById("timer").textContent = timer;

    clearInterval(timerInterval);
    clearInterval(chaseInterval);

    timerInterval = setInterval(()=>{
        timer++;
        document.getElementById("timer").textContent = timer;
    },1000);

    chaseInterval = setInterval(()=>{
        moveChaser();
    },450);

    draw();
}

newMaze();

</script>

</body>
</html>
